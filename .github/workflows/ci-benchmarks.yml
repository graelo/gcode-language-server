# Performance benchmarks: parsing, LSP, and validation.
#
# Triggers:
#   - push to main (automatic baseline)
#   - workflow_dispatch (on-demand, supports branch selection and benchmark type)
#
# On-demand for a PR branch:
#   gh workflow run "CI: Benchmarks" --ref <branch>
#   gh workflow run "CI: Benchmarks" --ref <branch> -f benchmark_type=parsing
#
# Local:
#   act push -W .github/workflows/ci-benchmarks.yml -j benchmark
#   act workflow_dispatch -W .github/workflows/ci-benchmarks.yml

name: 'CI: Benchmarks'

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      benchmark_type:
        description: 'Type of benchmark to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - parsing
          - lsp
          - validation

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  benchmark:
    name: Run benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Cache crates
        if: github.event_name == 'workflow_dispatch'
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        continue-on-error: false
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gnuplot

      - name: Setup – generate test files
        run: python3 benches/generate_test_files.py

      - name: Build (release)
        run: cargo build --release

      - name: Bench – parsing
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.benchmark_type == 'parsing' ||
          github.event.inputs.benchmark_type == 'all'
        run: cargo bench --bench parsing_benchmarks

      - name: Bench – LSP
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.benchmark_type == 'lsp' ||
          github.event.inputs.benchmark_type == 'all'
        run: cargo bench --bench lsp_benchmarks

      - name: Bench – validation
        if: |
          github.event_name != 'workflow_dispatch' ||
          github.event.inputs.benchmark_type == 'validation' ||
          github.event.inputs.benchmark_type == 'all'
        run: cargo bench --bench validation_benchmarks

      - name: Report – generate summary
        env:
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_REF_NAME: ${{ github.ref_name }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
        run: |
          mkdir -p benchmark-results
          {
            echo "# Performance Benchmark Results"
            echo ""
            echo "**Date:** $(date -u +%Y-%m-%d\ %H:%M:%S\ UTC)"
            echo "**Commit:** ${GITHUB_SHA}"
            echo "**Branch:** ${GITHUB_REF_NAME}"
            echo ""
            echo "## System Information"
            echo "- **OS:** $(uname -s) $(uname -r)"
            echo "- **CPU:** $(grep 'model name' /proc/cpuinfo | head -1 | cut -d: -f2 | xargs)"
            echo "- **Memory:** $(free -h | grep 'Mem:' | awk '{print $2}')"
            echo "- **Rust:** $(rustc --version)"
            echo ""
            echo "## Benchmark Results"
            echo "See the Actions logs for detailed benchmark results."
          } > benchmark-results/summary.md

      - name: Report – upload results
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results-${{ github.sha }}
          path: |
            benchmark-results/
            target/criterion/
            *_benchmark_results.json
          retention-days: 1

      - name: Report – check thresholds
        run: |
          echo "Checking performance against defined thresholds..."

          cat > check_performance.py << 'EOF'
          import os

          def check_benchmark_file(filename):
              if not os.path.exists(filename):
                  print(f"  {filename} not found, skipping threshold check")
                  return True

              try:
                  with open(filename, 'r') as f:
                      content = f.read()
                      if 'time:' in content:
                          print(f"  {filename} contains benchmark results")
                          return True
                      else:
                          print(f"  {filename} doesn't contain expected benchmark format")
                          return True
              except Exception as e:
                  print(f"  Error reading {filename}: {e}")
                  return False

          success = True
          success &= check_benchmark_file('parsing_benchmark_results.json')
          success &= check_benchmark_file('lsp_benchmark_results.json')
          success &= check_benchmark_file('validation_benchmark_results.json')

          if success:
              print("All benchmark files processed successfully")
          else:
              print("Some benchmark checks failed")
              import sys
              sys.exit(1)
          EOF

          python3 check_performance.py
