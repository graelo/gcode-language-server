# Code coverage: unconditional on main, on-demand via workflow_dispatch.
#
# On-demand for a PR branch:
#   gh workflow run "CI: Coverage" --ref <branch>
#
# Local:
#   act push -W .github/workflows/ci-coverage.yml

name: 'CI: Coverage'

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Run coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@0631aa6515c7d545823c67cfae7ef4fc7f490154 # v2.81.8
        with:
          tool: cargo-tarpaulin@0.35.4

      - name: Generate coverage report
        run: cargo tarpaulin --locked --verbose --timeout 120 --out xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6.0.2
        with:
          files: cobertura.xml
          fail_ci_if_error: false
