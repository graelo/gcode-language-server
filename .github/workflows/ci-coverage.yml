# Code coverage: unconditional on main, on-demand via workflow_dispatch.
#
# On-demand for a PR branch:
#   gh workflow run "CI: Coverage" --ref <branch>
#
# Local:
#   act push -W .github/workflows/ci-coverage.yml

name: 'CI: Coverage'

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  coverage:
    name: Run coverage
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: stable

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@0fd46367812ee04360509b4169d9f659d6892bb2 # v2.79.15
        with:
          tool: cargo-tarpaulin@0.35.4

      - name: Generate coverage report
        run: cargo tarpaulin --locked --verbose --timeout 120 --out xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: cobertura.xml
          fail_ci_if_error: false
